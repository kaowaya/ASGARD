        }

            font-weight: 500;

        }

            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

            align-items: center;
            justify-content: center;

        /**
         * Debounce函数 - 性能优化
         * 防止函数在短时间内被频繁调用
         * @param {Function} func - 需要防抖的函数
         * @param {number} wait - 等待时间(毫秒)
         * @returns {Function} 防抖后的函数
         */
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

                const isCurrentTab = tab.dataset.tab === tabId;
                if (tab.parentElement.classList.contains('md:flex')) {
                    // 桌面端样式
                    if (isCurrentTab) {
                        tab.classList.remove('text-gray-500', 'border-transparent');
                        tab.classList.add('text-black', 'border-black');
                    } else {
                        tab.classList.remove('text-black', 'border-black');
                        tab.classList.add('text-gray-500', 'border-transparent');
                    }
                } else {
                    // 移动端样式
                    if (isCurrentTab) {
                        tab.classList.remove('text-gray-600', 'border-transparent');
                        tab.classList.add('text-black', 'bg-gray-50', 'border-black');
                    } else {
                        tab.classList.remove('text-black', 'bg-gray-50', 'border-black');
                        tab.classList.add('text-gray-600', 'border-transparent');
                    }
                }
            });

            // 渲染Tab内容
            renderTabContent(tabId);

            // 关闭移动端菜单

            if (!mobileMenu.classList.contains('hidden')) {

        /**
         * 初始化案例详情页DAG图表
         */
        function initCaseDAG() {
            const caseItem = cases.find(c => c.id === casesState.selectedCase);
            if (!caseItem || !caseItem.dag) return;

            const chartDom = document.getElementById('case-dag-chart');
            if (!chartDom) return;

            const myChart = echarts.init(chartDom);

            // 节点颜色映射
            const categoryColors = {
                input: '#3B82F6',
                process: '#8B5CF6',
                diagnosis: '#F59E0B',
                assessment: '#EF4444',
                optimization: '#10B981',
                output: '#6B7280'
            };

            // 构建节点数据
            const nodes = caseItem.dag.nodes.map(node => ({
                id: node.id,
                name: node.name,
                category: node.category,
                symbolSize: 60,
                itemStyle: {
                    color: categoryColors[node.category] || '#6B7280'
                },
                label: {
                    show: true,
                    fontSize: 12,
                    color: '#374151'
                }
            }));

            // 构建连线数据
            const links = caseItem.dag.links.map(link => ({
                source: link.source,
                target: link.target,
                lineStyle: {
                    color: '#9CA3AF',
                    curveness: 0.2
                }
            }));

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}'
                },
                series: [{
                    type: 'graph',
                    layout: 'none',
                    symbolSize: 60,
                    roam: true,
                    label: {
                        show: true,
                        fontSize: 12
                    },
                    edgeSymbol: ['circle', 'arrow'],
                    edgeSymbolSize: [4, 10],
                    edgeLabel: {
                        fontSize: 12
                    },
                    data: nodes,
                    links: links,
                    lineStyle: {
                        opacity: 0.9,
                        width: 2,
                        curveness: 0.2
                    }
                }],
                // 简单的布局 - 手动设置位置
                grid: {
                    left: '10%',
                    right: '10%',
                    top: '10%',
                    bottom: '10%'
                }
            };

            // 为节点设置位置（简单的从左到右布局）
            const levels = {
                input: 0,
                process: 1,
                diagnosis: 2,
                assessment: 3,
                optimization: 3,
                output: 4
            };

            nodes.forEach((node, index) => {
                const level = levels[node.category] || 2;
                const nodesInLevel = nodes.filter(n => levels[n.category] === level).length;
                const positionInLevel = nodes.filter(n => levels[n.category] === level && n.id <= node.id).length;

                node.x = level * 200 + 100;
                node.y = (positionInLevel - 1) * (300 / Math.max(nodesInLevel, 1)) + 100;
            });

            myChart.setOption(option);

            // 响应式调整(使用debounce优化性能)
            window.addEventListener('resize', debounce(() => {
                myChart.resize();
            }, 250));
        }

         */
        function addMessage(role, content, metadata = {}) {
            const chatHistory = document.getElementById('chat-history');
            const messageObj = { role, content, ...metadata };
            agentState.messages.push(messageObj);

            const messageHtml = role === 'user'
                ? renderUserMessage(content)
                : renderAgentMessage(content, metadata);

            chatHistory.insertAdjacentHTML('beforeend', messageHtml);
            chatHistory.scrollTop = chatHistory.scrollHeight;

        /**
         * 打字机效果
         * @param {HTMLElement} element
         * @param {string} text
         * @param {number} speed
         */
        async function typeWriter(element, text, speed = 20) {
            const formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            element.innerHTML = '';
            let i = 0;

            return new Promise(resolve => {
                const timer = setInterval(() => {
                    if (i < formattedText.length) {
                        // 处理HTML标签
                        if (formattedText.charAt(i) === '<') {
                            const closeIndex = formattedText.indexOf('>', i);
                            element.innerHTML += formattedText.substring(i, closeIndex + 1);
                            i = closeIndex + 1;
                        } else {
                            element.innerHTML += formattedText.charAt(i);
                            i++;
                        }
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        function generateDAGData(intent) {
            const skillColors = {
                '数据输入': '#94a3b8',
                'C3.0': '#3b82f6',
                'C3.1': '#ef4444',
                'C3.2': '#f97316',
                'C3.13': '#8b5cf6',
                'C3.5': '#10b981',
                '分析报告': '#06b6d4'
            };

            const skillDescriptions = {
                '数据输入': '上传电池数据',
                'C3.0': '数据清洗去噪',
                'C3.1': '内短路SOS诊断',
                'C3.2': 'P2D模型诊断',

                'C3.5': '安全熵评估',
                '分析报告': '生成分析报告'
            };

            // 根据意图生成不同的DAG
            let nodes = [];
            let links = [];

            // 输入节点
            nodes.push({
                id: 'input',
                name: '数据输入',
                x: 100,
                y: 300,
                itemStyle: { color: skillColors['数据输入'] },
                description: skillDescriptions['数据输入']
            });

            // 技能节点
            const skillX = { 'C3.0': 300, 'C3.1': 500, 'C3.2': 500, 'C3.13': 500, 'C3.5': 700 };

            intent.skills.forEach((skillId, index) => {
                nodes.push({
                    id: skillId,
                    name: skillId,
                    x: skillX[skillId] || 300 + index * 200,
                    y: 300 + (index % 2 === 0 ? 100 : -100),
                    itemStyle: { color: skillColors[skillId] },
                    description: skillDescriptions[skillId]
                });
            });

            // 输出节点
            nodes.push({
                id: 'output',
                name: '分析报告',
                x: 900,
                y: 300,
                itemStyle: { color: skillColors['分析报告'] },
                description: skillDescriptions['分析报告']
            });

            // 连接关系
            links.push({ source: 'input', target: 'C3.0' });

            const mainSkill = intent.skills.find(s => s !== 'C3.0');
            if (mainSkill) {
                links.push({ source: 'C3.0', target: mainSkill });
                links.push({ source: mainSkill, target: 'C3.5' });
            }

            links.push({ source: 'C3.5', target: 'output' });

            return { nodes, links };
        }

                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 设置拖拽上传功能
         */
        function setupDragDrop() {
            const dropzone = document.getElementById('upload-dropzone');
            const fileInput = document.getElementById('file-input');
            const selectFileBtn = document.getElementById('select-file-btn');
            const loadExampleBtn = document.getElementById('load-example-btn');

            if (!dropzone) return;

            // 拖拽事件处理
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('border-blue-500', 'bg-blue-50');
            });

            dropzone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-blue-500', 'bg-blue-50');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-blue-500', 'bg-blue-50');

                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileUpload(files[0]);
                }
            });

            // 文件选择按钮
            if (selectFileBtn) {
                selectFileBtn.addEventListener('click', () => {
                    fileInput.click();
                });
            }

            // 文件输入变化
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        handleFileUpload(e.target.files[0]);
                    }
                });
            }

            // 加载示例数据按钮
            if (loadExampleBtn) {
                loadExampleBtn.addEventListener('click', loadExampleData);
            }
        }

        /**
         * 处理文件上传
         * @param {File} file - 上传的文件
         */
        function handleFileUpload(file) {
            const uploadStatus = document.getElementById('upload-status');
            const uploadProgress = document.getElementById('upload-progress');
            const uploadPercentage = document.getElementById('upload-percentage');
            const uploadFilename = document.getElementById('upload-filename');

            // 显示上传状态
            uploadStatus.classList.remove('hidden');
            uploadFilename.textContent = file.name;

            // 模拟上传进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                uploadProgress.style.width = progress + '%';
                uploadPercentage.textContent = progress + '%';

                if (progress >= 100) {
                    clearInterval(interval);
                    // 加载示例数据（实际应用中应解析CSV）
                    setTimeout(() => {
                        loadExampleData();
                    }, 500);
                }
            }, 200);
        }

        /**
         * 加载示例数据并渲染图表
         */
        function loadExampleData() {
            // 显示诊断摘要
            renderSummaryCard(mockAnalysisData.summary);

            // 显示AI建议
            renderRecommendationsCard(mockAnalysisData.recommendations);

            // 初始化图表
            initVoltageChart(mockAnalysisData.voltage);
            initTemperatureChart(mockAnalysisData.temperature);
            initRadarChart(mockAnalysisData.risk);
        }

        /**
         * 渲染诊断摘要卡片
         * @param {Object} summary - 诊断摘要数据
         */
        function renderSummaryCard(summary) {
            const summaryCard = document.getElementById('summary-card');
            const riskBadge = document.getElementById('risk-badge');
            const confidenceValue = document.getElementById('confidence-value');
            const analysisTime = document.getElementById('analysis-time');

            if (!summaryCard) return;

            summaryCard.classList.remove('hidden');

            // 设置风险等级颜色
            const riskColors = {
                high: 'bg-red-100 text-red-700',
                medium: 'bg-yellow-100 text-yellow-700',
                low: 'bg-green-100 text-green-700'
            };

            const riskLabels = {
                high: '高风险',
                medium: '中风险',
                low: '低风险'
            };

            riskBadge.className = `px-4 py-2 rounded-lg font-semibold ${riskColors[summary.riskLevel]}`;
            riskBadge.textContent = riskLabels[summary.riskLevel];

            confidenceValue.textContent = summary.confidence + '%';
            analysisTime.textContent = new Date(summary.analysisTime).toLocaleString('zh-CN');
        }

        /**
         * 渲染AI建议卡片
         * @param {Array} recommendations - 建议列表
         */
        function renderRecommendationsCard(recommendations) {
            const recommendationsCard = document.getElementById('recommendations-card');
            const recommendationsList = document.getElementById('recommendations-list');

            if (!recommendationsCard || !recommendationsList) return;

            recommendationsCard.classList.remove('hidden');

            const priorityColors = {
                high: 'border-red-400 bg-red-50',
                medium: 'border-yellow-400 bg-yellow-50',
                low: 'border-green-400 bg-green-50'
            };

            const priorityLabels = {
                high: '高',
                medium: '中',
                low: '低'
            };

            recommendationsList.innerHTML = recommendations.map(rec => `
                <div class="flex items-start gap-3 p-3 border-l-4 rounded-r-lg ${priorityColors[rec.priority]}">
                    <span class="px-2 py-1 text-xs font-semibold rounded bg-white">
                        ${priorityLabels[rec.priority]}
                    </span>
                    <p class="text-body flex-1">${rec.text}</p>
                </div>
            `).join('');
        }

        /**
         * 初始化电压曲线图
         * @param {Array} data - 电压数据
         */
        function initVoltageChart(data) {
            const chartDom = document.getElementById('voltage-chart');
            if (!chartDom) return;

            const myChart = echarts.init(chartDom);

            const times = data.map(d => d.time);
            const cellKeys = Object.keys(data[0]).filter(k => k !== 'time');

            const series = cellKeys.map(cell => ({
                name: cell,
                type: 'line',
                data: data.map(d => d[cell]),
                smooth: true,
                symbol: 'none',
                lineStyle: {
                    width: 2
                }
            }));

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    }
                },
                legend: {
                    data: cellKeys,
                    bottom: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: times,
                    name: '时间'
                },
                yAxis: {
                    type: 'value',
                    name: '电压 (V)',
                    min: 3.4,
                    max: 3.8
                },
                series: series
            };

            myChart.setOption(option);

            // 响应式调整(使用debounce优化性能)
            window.addEventListener('resize', debounce(() => {
                myChart.resize();
            }, 250));
        }

        /**
         * 初始化温度热力图
         * @param {Array} data - 温度数据
         */
        function initTemperatureChart(data) {
            const chartDom = document.getElementById('temperature-chart');
            if (!chartDom) return;

            const myChart = echarts.init(chartDom);

            const times = data.map(d => d.time);
            const cellKeys = Object.keys(data[0]).filter(k => k !== 'time');

            // 转换数据格式为热力图所需格式
            const heatmapData = [];
            data.forEach((d, i) => {
                cellKeys.forEach((cell, j) => {
                    heatmapData.push([j, i, d[cell]]);
                });
            });

            const option = {
                tooltip: {
                    position: 'top',
                    formatter: function(params) {
                        return `电池${cellKeys[params.data[0]]}<br/>时间: ${times[params.data[1]]}<br/>温度: ${params.data[2]}°C`;
                    }
                },
                grid: {
                    left: '10%',
                    right: '5%',
                    bottom: '10%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: cellKeys,
                    name: '电池编号',
                    splitArea: {
                        show: true
                    }
                },
                yAxis: {
                    type: 'category',
                    data: times,
                    name: '时间',
                    splitArea: {
                        show: true
                    }
                },
                visualMap: {
                    min: 20,
                    max: 35,
                    calculable: true,
                    orient: 'horizontal',
                    left: 'center',
                    bottom: '0%',
                    inRange: {
                        color: ['#50a3ba', '#eac736', '#d94e5d']
                    },
                    text: ['高温', '低温']
                },
                series: [{
                    type: 'heatmap',
                    data: heatmapData,
                    label: {
                        show: false
                    },
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };

            myChart.setOption(option);

            // 响应式调整(使用debounce优化性能)
            window.addEventListener('resize', debounce(() => {
                myChart.resize();
            }, 250));
        }

        /**
         * 初始化风险雷达图
         * @param {Object} risk - 风险数据
         */
        function initRadarChart(risk) {
            const chartDom = document.getElementById('radar-chart');
            if (!chartDom) return;

            const myChart = echarts.init(chartDom);

            const option = {
                tooltip: {},
                legend: {
                    data: ['风险评估'],
                    bottom: 0
                },
                radar: {
                    indicator: [
                        { name: '内短路风险', max: 100 },
                        { name: '析锂风险', max: 100 },
                        { name: '健康状态', max: 100 },
                        { name: '安全熵', max: 100 },
                        { name: '衰减速率', max: 100 }
                    ],
                    radius: '65%',
                    splitNumber: 5,
                    name: {
                        textStyle: {
                            fontSize: 14
                        }
                    }
                },
                series: [{
                    name: '风险评估',
                    type: 'radar',
                    data: [{
                        value: [
                            risk.internalShort,
                            risk.lithiumPlating,
                            risk.health,
                            risk.safetyEntropy,
                            risk.degradation
                        ],
                        name: '风险评估',
                        areaStyle: {
                            opacity: 0.3
                        },
                        lineStyle: {
                            width: 2
                        }
                    }]
                }]
            };

            myChart.setOption(option);

            // 响应式调整(使用debounce优化性能)
            window.addEventListener('resize', debounce(() => {
                myChart.resize();
            }, 250));
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initNavigation);
    </script>
</body>
</html>
