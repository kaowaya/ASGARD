version: '3.8'

services:
  # Agent Interface（REST API）
  agent-interface:
    build:
      context: .
      dockerfile: Dockerfile.agent-interface
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - workflow-network

  # Redis（workflow状态存储）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - workflow-network

  # 监控 - Prometheus（可选）
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - workflow-network
    profiles:
      - monitoring

  # 监控 - Grafana（可选）
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - workflow-network
    profiles:
      - monitoring

volumes:
  redis_data:
  grafana_data:

networks:
  workflow-network:
    driver: bridge
